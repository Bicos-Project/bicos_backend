# =========================================================
# SERVIDOR
# =========================================================
server.port=8080

# =========================================================
# BANCO DE DADOS ? PostgreSQL
# Troque os valores entre {} pelos seus dados reais
# =========================================================
spring.datasource.url=jdbc:postgresql://localhost:5432/bicos
spring.datasource.username=postgres
spring.datasource.password=Gra_Tubas123@!
spring.datasource.driver-class-name=org.postgresql.Driver

# =========================================================
# JPA / HIBERNATE
# =========================================================

# validate = Hibernate confere se as entidades batem com o banco, mas NÃO altera nada.
# Use isso quando o banco já foi criado pelo seu script SQL (que é o nosso caso).
# Outras opções:
#   create       ? recria o banco a cada inicialização (perde dados ? só para testes iniciais)
#   create-drop  ? cria ao iniciar, destrói ao parar
#   update       ? tenta alterar o banco para bater com as entidades (arriscado em produção)
#   none         ? Hibernate não faz nada com o schema
spring.jpa.hibernate.ddl-auto=validate

# Exibe as queries SQL geradas no console ? ótimo para aprendizado e debug
spring.jpa.show-sql=true

# Formata o SQL exibido de forma legível
spring.jpa.properties.hibernate.format_sql=true


# =========================================================
# SERIALIZAÇÃO JSON
# =========================================================

# Não inclui campos com valor null no JSON de resposta.
# Ex: se telefone for null, ele simplesmente não aparece no JSON.
spring.jackson.default-property-inclusion=non_null

# =========================================================
# JWT
# =========================================================

# Chave secreta usada para assinar os tokens.
# Em produção: use uma string longa, aleatória e guarde em variável de ambiente.
# Deve ter pelo menos 256 bits (32 caracteres) para o algoritmo HS256.
jwt.secret=bicos-projeto-faculdade-chave-secreta-super-segura-2025
jwt.expiration=86400000
# 86400000 ms = 24 horas
# Em produção, valores menores (ex: 3600000 = 1h) são mais seguros